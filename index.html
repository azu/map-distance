<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>駅徒歩距離マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; }
  header { padding: 12px 16px; background: #f7f7f7; border-bottom: 1px solid #ddd; }
  h1 { margin: 0 0 8px; font-size: 16px; }
  h1 a { color: inherit; text-decoration: none; }
  .controls { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  textarea { flex: 1; min-width: 280px; min-height: 56px; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; font-family: inherit; }
  input[type="number"] { padding: 6px 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; width: 80px; }
  button { padding: 8px 14px; font-size: 14px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #1558b0; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  label { font-size: 13px; color: #444; }
  #status { font-size: 13px; color: #555; min-height: 18px; }
  #status.error { color: #d33; }
  #map { flex: 1; width: 100%; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 13px; align-items: center; }
  .legend a { display: inline-flex; align-items: center; gap: 6px; color: #1a73e8; text-decoration: none; }
  .legend a:hover { text-decoration: underline; }
  .legend i { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 2px solid; }
  #openAllGmaps { font-size: 13px; padding: 4px 10px; background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
  #openAllGmaps:hover { background: #e8f0fe; }
  #openAllGmaps:disabled { display: none; }
  .popup a { color: #1a73e8; }
  .station-icon { background: transparent; border: none; }
  .station-icon div { width: 26px; height: 26px; border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.4); border: 2px solid white; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>駅徒歩距離マップ</h1>
  <div class="controls">
    <div class="row">
      <textarea id="input" placeholder="例: 京成本線「新三河島」駅 徒歩4分／山手線・京浜東北線・千代田線「西日暮里」駅 徒歩14分">京成本線「新三河島」駅 徒歩4分／山手線・京浜東北線・千代田線「西日暮里」駅 徒歩14分</textarea>
    </div>
    <div class="row">
      <label>徒歩速度: <input type="number" id="speed" value="80" min="40" max="120" step="10">m/分</label>
      <button id="run">表示</button>
      <button id="openAllGmaps" type="button" disabled>重なり範囲をGoogle Mapsで開く</button>
      <span style="font-size:12px;color:#888">地図: OpenStreetMap / ジオコーディング: Photon</span>
    </div>
    <div id="status"></div>
    <div id="legend" class="legend"></div>
  </div>
</header>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
(() => {
  const COLORS = ['#e53935', '#1e88e5', '#43a047', '#fb8c00', '#8e24aa', '#00acc1', '#c0ca33', '#5e35b1'];

  const $ = (id) => document.getElementById(id);
  const statusEl = $('status');
  const legendEl = $('legend');

  let map = null;
  let layerGroup = null;

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', isError);
  }

  // 「駅名」駅 (間にバス停などを含まない) 徒歩N分 のみ抽出
  function parseInput(text) {
    const entries = [];
    const re = /[「『]([^」』]+)[」』]\s*駅[^「『]*?徒歩\s*(\d+)\s*分/g;
    let m;
    while ((m = re.exec(text)) !== null) {
      const station = m[1];
      const minutes = parseInt(m[2], 10);
      // 路線名は直前の区切り(／/改行)からこの駅名までの文字列
      const before = text.slice(0, m.index);
      const lineMatch = before.match(/[^／/\n]*$/);
      const lines = lineMatch ? lineMatch[0].trim() : null;
      entries.push({
        station,
        minutes,
        lines: lines || null,
        label: `${station}駅 徒歩${minutes}分`,
      });
    }
    return entries;
  }

  const JP_CENTER = { lat: 36.2048, lng: 138.2529 };

  const normLine = s => (s || '').replace(/[\s・、,\-ー－‐]/g, '').replace(/線$/, '');

  // HeartRails Express API: 日本の駅DB (駅名・路線・都道府県つき)
  async function fetchFromHeartRails(stationName) {
    try {
      const url = `https://express.heartrails.com/api/json?method=getStations&name=${encodeURIComponent(stationName)}`;
      const res = await fetch(url);
      if (!res.ok) return [];
      const data = await res.json();
      const stations = data?.response?.station || [];
      return stations.map(s => ({
        lat: parseFloat(s.y),
        lng: parseFloat(s.x),
        props: { line: s.line, prefecture: s.prefecture, name: s.name, source: 'heartrails' },
      }));
    } catch (e) {
      console.warn('HeartRails failed', e);
      return [];
    }
  }

  async function fetchFromPhoton(query, limit = 8) {
    try {
      const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=${limit}&lat=${JP_CENTER.lat}&lon=${JP_CENTER.lng}`;
      const res = await fetch(url);
      if (!res.ok) return [];
      const data = await res.json();
      const features = (data.features || []).filter(f => f.properties && f.properties.countrycode === 'JP');
      return features.map(f => ({
        lat: f.geometry.coordinates[1],
        lng: f.geometry.coordinates[0],
        props: { ...f.properties, source: 'photon' },
      }));
    } catch (e) {
      console.warn('Photon failed', e);
      return [];
    }
  }

  async function geocodeStationCandidates(entry) {
    // 1. HeartRails (日本の駅DB) を優先: 路線名が一致する駅があればそれを候補にする
    const hr = await fetchFromHeartRails(entry.station);
    if (hr.length > 0) {
      if (entry.lines) {
        const hintNorm = normLine(entry.lines);
        const hintTokens = entry.lines.split(/[・、,]/).map(normLine).filter(Boolean);
        const matched = hr.filter(c => {
          const lineNorm = normLine(c.props.line);
          return hintTokens.some(t => t && (lineNorm.includes(t) || t.includes(lineNorm)))
            || (hintNorm && (lineNorm.includes(hintNorm) || hintNorm.includes(lineNorm)));
        });
        if (matched.length > 0) return matched;
      }
      return hr;
    }
    // 2. Photon にフォールバック
    const hints = [];
    if (entry.lines) hints.push(`${entry.lines} ${entry.station}駅`);
    hints.push(`${entry.station}駅`, `${entry.station} station`, entry.station);
    const seen = new Set();
    const all = [];
    for (const q of hints) {
      const cands = await fetchFromPhoton(q, 8);
      for (const c of cands) {
        const key = `${c.lat.toFixed(4)},${c.lng.toFixed(4)}`;
        if (seen.has(key)) continue;
        seen.add(key);
        all.push(c);
      }
      if (all.length >= 8) break;
    }
    return all;
  }

  // 全駅候補の組み合わせから、駅同士の合計距離が最小になるものを選ぶ (同名駅の誤認識対策)
  function pickBestCombination(candidatesPerEntry) {
    if (candidatesPerEntry.some(c => c.length === 0)) return null;
    let best = null;
    let bestScore = Infinity;
    const n = candidatesPerEntry.length;
    function dfs(idx, pick) {
      if (idx === n) {
        if (n === 1) { best = [...pick]; return; }
        let score = 0;
        for (let i = 0; i < n; i++) {
          for (let j = i + 1; j < n; j++) {
            score += haversine(pick[i].lat, pick[i].lng, pick[j].lat, pick[j].lng);
          }
        }
        if (score < bestScore) { bestScore = score; best = [...pick]; }
        return;
      }
      for (const c of candidatesPerEntry[idx]) {
        pick.push(c);
        dfs(idx + 1, pick);
        pick.pop();
      }
    }
    dfs(0, []);
    return best;
  }

  function ensureMap() {
    if (map) return;
    map = L.map('map').setView([35.681236, 139.767125], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    }).addTo(map);
    layerGroup = L.layerGroup().addTo(map);
  }

  function clearLayers() {
    if (layerGroup) layerGroup.clearLayers();
  }

  function renderLegend(items) {
    legendEl.innerHTML = '';
    items.forEach((it, i) => {
      const color = COLORS[i % COLORS.length];
      const gmaps = `https://www.google.com/maps/search/?api=1&query=${it.loc.lat},${it.loc.lng}`;
      const a = document.createElement('a');
      a.href = gmaps;
      a.target = '_blank';
      a.rel = 'noopener';
      a.title = 'Google Mapsで開く';
      a.innerHTML = `<i style="border-color:${color}; background:${color}33"></i>${it.label} (${it.radius}m) ↗`;
      legendEl.appendChild(a);
    });
  }

  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat / 2) ** 2
      + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  // 全円の共通領域の「境界(端)」を返す: 各円の外周のうち他すべての円にも含まれる弧を集め、角度順に並べる
  function overlapBoundary(results) {
    if (results.length === 1) {
      const r = results[0];
      const ring = [];
      const latRad = r.loc.lat * Math.PI / 180;
      for (let k = 0; k < 360; k++) {
        const angle = (k / 360) * 2 * Math.PI;
        ring.push({
          lat: r.loc.lat + (r.radius * Math.cos(angle)) / 111000,
          lng: r.loc.lng + (r.radius * Math.sin(angle)) / (111000 * Math.cos(latRad)),
        });
      }
      return { boundary: ring, center: { ...r.loc } };
    }

    const N = 720;
    const TOL = 1; // 丸め誤差吸収 (m)
    const boundary = [];
    for (let i = 0; i < results.length; i++) {
      const r = results[i];
      const latRad = r.loc.lat * Math.PI / 180;
      for (let k = 0; k < N; k++) {
        const angle = (k / N) * 2 * Math.PI;
        const lat = r.loc.lat + (r.radius * Math.cos(angle)) / 111000;
        const lng = r.loc.lng + (r.radius * Math.sin(angle)) / (111000 * Math.cos(latRad));
        let inside = true;
        for (let j = 0; j < results.length; j++) {
          if (j === i) continue;
          if (haversine(lat, lng, results[j].loc.lat, results[j].loc.lng) > results[j].radius + TOL) {
            inside = false;
            break;
          }
        }
        if (inside) boundary.push({ lat, lng });
      }
    }
    if (boundary.length < 3) return null;

    const cLat = boundary.reduce((s, p) => s + p.lat, 0) / boundary.length;
    const cLng = boundary.reduce((s, p) => s + p.lng, 0) / boundary.length;
    boundary.sort((a, b) => Math.atan2(a.lat - cLat, a.lng - cLng) - Math.atan2(b.lat - cLat, b.lng - cLng));
    return { boundary, center: { lat: cLat, lng: cLng } };
  }

  function gmapsLink(lat, lng, label) {
    const q = encodeURIComponent(`${lat},${lng}`);
    return `https://www.google.com/maps/search/?api=1&query=${q}${label ? `&query_place_id=` : ''}`;
  }

  async function run() {
    const text = $('input').value;
    const speed = parseInt($('speed').value, 10) || 80;
    const entries = parseInput(text);
    if (entries.length === 0) {
      setStatus('駅情報を認識できませんでした。「駅名」徒歩N分 の形式で入力してください', true);
      return;
    }

    $('run').disabled = true;
    try {
      ensureMap();
      clearLayers();

      const candidatesPerEntry = [];
      for (let i = 0; i < entries.length; i++) {
        const entry = entries[i];
        setStatus(`駅候補を検索中... (${i + 1}/${entries.length}) ${entry.station}駅`);
        const cands = await geocodeStationCandidates(entry);
        if (cands.length === 0) throw new Error(`${entry.station}駅 が見つかりませんでした`);
        candidatesPerEntry.push(cands);
      }
      const picked = pickBestCombination(candidatesPerEntry);
      if (!picked) throw new Error('駅候補の組み合わせを決定できませんでした');

      const results = entries.map((entry, i) => ({
        ...entry,
        loc: { lat: picked[i].lat, lng: picked[i].lng },
        radius: entry.minutes * speed,
        placeProps: picked[i].props,
      }));

      const bounds = L.latLngBounds([]);
      results.forEach((r, i) => {
        const color = COLORS[i % COLORS.length];
        const circle = L.circle([r.loc.lat, r.loc.lng], {
          radius: r.radius,
          color,
          weight: 2,
          opacity: 0.9,
          fillColor: color,
          fillOpacity: 0.2,
        }).addTo(layerGroup);
        bounds.extend(circle.getBounds());

        const icon = L.divIcon({
          className: 'station-icon',
          html: `<div style="background:${color}">${i + 1}</div>`,
          iconSize: [26, 26],
          iconAnchor: [13, 13],
        });
        const marker = L.marker([r.loc.lat, r.loc.lng], { icon, title: r.label }).addTo(layerGroup);
        const gmaps = `https://www.google.com/maps/search/?api=1&query=${r.loc.lat},${r.loc.lng}`;
        const gmapsStation = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.station + '駅')}`;
        marker.bindPopup(`
          <div class="popup">
            <strong>${r.station}駅</strong><br>
            徒歩${r.minutes}分 / 半径${r.radius}m<br>
            ${r.lines ? `<small>${r.lines}</small><br>` : ''}
            <small>${r.loc.lat.toFixed(6)}, ${r.loc.lng.toFixed(6)}</small><br>
            <a href="${gmaps}" target="_blank" rel="noopener">Google Mapsで座標を開く</a><br>
            <a href="${gmapsStation}" target="_blank" rel="noopener">Google Mapsで駅を検索</a>
          </div>
        `);
      });

      if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });
      renderLegend(results);

      const overlap = overlapBoundary(results);
      const openBtn = $('openAllGmaps');
      if (overlap) {
        const poly = L.polygon(
          overlap.boundary.map(p => [p.lat, p.lng]),
          { color: '#000', weight: 2, fillColor: '#ffeb3b', fillOpacity: 0.35, dashArray: '4,4' }
        ).addTo(layerGroup);
        poly.bringToFront();

        const c = overlap.center;
        const gmaps = `https://www.google.com/maps/search/?api=1&query=${c.lat},${c.lng}`;
        poly.bindPopup(`<strong>全条件を満たす範囲</strong><br><small>中心: ${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}</small><br><a href="${gmaps}" target="_blank" rel="noopener">Google Mapsで中心を開く</a>`);

        openBtn.disabled = false;
        openBtn.textContent = '重なり範囲をGoogle Mapsで開く';
        openBtn.onclick = () => window.open(gmaps, '_blank', 'noopener');
        setStatus(`${results.length}件の駅を表示しました。黄色の領域が全条件を満たす重なり範囲です。`);
      } else {
        openBtn.disabled = true;
        openBtn.textContent = '重なり範囲なし';
        setStatus(`${results.length}件の駅を表示しました。すべての条件を満たす範囲は存在しません。`);
      }
    } catch (e) {
      console.error(e);
      setStatus(e.message || String(e), true);
    } finally {
      $('run').disabled = false;
    }
  }

  $('run').addEventListener('click', () => { updateUrl(); run(); });
  $('input').addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { updateUrl(); run(); }
  });

  function updateUrl() {
    const params = new URLSearchParams();
    const q = $('input').value.trim();
    const speed = $('speed').value;
    if (q) params.set('q', q);
    if (speed && speed !== '80') params.set('speed', speed);
    const url = `${location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
    history.replaceState(null, '', url);
  }

  function loadFromUrl() {
    const params = new URLSearchParams(location.search);
    const q = params.get('q');
    const speed = params.get('speed');
    if (speed) $('speed').value = speed;
    if (q) {
      $('input').value = q;
      run();
    }
  }

  window.addEventListener('popstate', loadFromUrl);
  loadFromUrl();
})();
</script>
</body>
</html>
